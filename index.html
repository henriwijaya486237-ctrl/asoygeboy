<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termux Cloud Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0; background-color: #000000; color: #fff;
            overflow: hidden; font-family: monospace;
        }
        /* Terminal Full Screen */
        #terminal-container {
            height: 100%; width: 100%; padding: 4px; box-sizing: border-box;
        }
        .xterm .xterm-viewport { overflow-y: auto !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        /* Drawer Sesi (Geser Kiri) */
        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        
        /* Menyembunyikan Scrollbar di Tab Header tapi tetap bisa di-scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased flex h-screen relative">

    <!-- LAYAR LOGIN -->
    <div id="login-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black px-4">
        <div class="p-8 w-full max-w-sm text-center">
            <h1 class="text-green-500 font-bold text-xl mb-6">~ $ termux-login</h1>
            <input type="password" id="secret-key" placeholder="Enter Secret Key..." 
                class="w-full bg-transparent border-b border-green-800 text-green-400 px-2 py-2 text-center focus:outline-none focus:border-green-400 transition-colors mb-6 font-mono">
            <button onclick="login()" id="login-btn" class="w-full border border-green-700 hover:bg-green-900 text-green-400 py-2 transition-colors font-mono">
                [ CONNECT ]
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">Access Denied.</p>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Flex Column) -->
    <div id="app-screen" class="hidden h-full w-full flex flex-col relative">
        
        <!-- HEADER: TABS & GLOBAL ACTIONS -->
        <div class="flex items-center justify-between bg-gray-900 border-b border-gray-800 px-2 py-2 shrink-0 h-14">
            
            <!-- Kiri: Hamburger + Tabs -->
            <div class="flex items-center flex-1 overflow-hidden">
                <button onclick="toggleSidebar()" class="bg-gray-800 text-white p-2 mr-2 rounded-md hover:bg-gray-700 focus:outline-none shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                
                <div class="flex overflow-x-auto no-scrollbar gap-2 items-center flex-1 pr-2">
                    <button onclick="switchTab('termux')" id="tab-termux" class="px-3 py-1.5 rounded bg-gray-700 text-green-400 whitespace-nowrap text-sm font-bold shadow-inner">Termux</button>
                    <button onclick="switchTab('vps1')" id="tab-vps1" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm border border-transparent hover:border-gray-700"><span id="status-vps1" class="text-red-500 mr-1">●</span>VPS 1</button>
                    <button onclick="switchTab('vps2')" id="tab-vps2" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm border border-transparent hover:border-gray-700"><span id="status-vps2" class="text-red-500 mr-1">●</span>VPS 2</button>
                    <button onclick="switchTab('vps3')" id="tab-vps3" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm border border-transparent hover:border-gray-700"><span id="status-vps3" class="text-red-500 mr-1">●</span>VPS 3</button>
                    <button onclick="switchTab('github')" id="tab-github" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm font-bold border border-transparent hover:border-gray-700">GitHub 🐙</button>
                </div>
            </div>

            <!-- Kanan: Upload & Download (Ada di Semua Tab) -->
            <div class="flex gap-2 shrink-0 ml-2">
                <button onclick="triggerUpload()" title="Upload File" class="bg-blue-600/80 hover:bg-blue-500 text-white p-2 rounded shadow text-sm">📤</button>
                <button onclick="triggerDownload()" title="Download File" class="bg-green-600/80 hover:bg-green-500 text-white p-2 rounded shadow text-sm">📥</button>
            </div>
            
            <!-- Hidden Input File untuk Upload -->
            <input type="file" id="file-uploader" class="hidden" onchange="handleFileUpload(event)">
        </div>

        <!-- SIDEBAR / DRAWER SESSIONS (Spesifik per Tab) -->
        <div id="sidebar" class="absolute inset-y-0 left-0 w-64 bg-gray-900 border-r border-gray-800 z-50 shadow-2xl flex flex-col pt-14">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black/20">
                <span class="text-green-400 font-bold" id="sidebar-title">SESSIONS (Termux)</span>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white">&times;</button>
            </div>
            
            <!-- Daftar Sesi Tmux (Diisi via JavaScript) -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1 font-mono text-sm" id="session-list">
                <p class="text-gray-500 text-xs px-2 py-4">Memuat sesi...</p>
            </div>
            
            <!-- Tombol Statis Tambah & Hapus Sesi di Bawah -->
            <div class="p-3 border-t border-gray-800 grid grid-cols-2 gap-2 bg-black/40">
                <button onclick="addSession()" class="text-xs border border-green-600 text-green-400 py-2 rounded hover:bg-green-900 font-bold tracking-wide">+ SESI BARU</button>
                <button onclick="deleteSession()" class="text-xs border border-red-600 text-red-400 py-2 rounded hover:bg-red-900 font-bold tracking-wide">- HAPUS</button>
            </div>
        </div>

        <!-- Lapisan Gelap saat sidebar buka -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="absolute inset-0 z-40 hidden bg-black/50 backdrop-blur-sm"></div>

        <!-- AREA KONTEN UTAMA (Terminal & GitHub) -->
        <div class="flex-1 relative overflow-hidden bg-black">
            
            <!-- Terminal Container (Xterm.js) -->
            <div id="terminal-container" class="absolute inset-0"></div>
            
            <!-- Overlay Loading Terminal -->
            <div id="terminal-overlay" class="absolute inset-0 bg-black/90 z-30 hidden flex-col items-center justify-center font-mono">
                <p class="text-green-500" id="overlay-text">Connecting...</p>
            </div>

            <!-- GitHub Panel Container (Hidden by default) -->
            <div id="github-container" class="absolute inset-0 hidden bg-black p-4 z-20 overflow-y-auto font-mono">
                <div class="max-w-3xl mx-auto">
                    <h2 class="text-orange-400 mb-6 text-2xl font-bold border-b border-gray-800 pb-2">🐙 GitHub Repository Manager</h2>
                    <p class="text-gray-400 text-sm mb-6">Sinkronisasi kode dari/ke GitHub dengan satu klik. Pastikan Token di config.py sudah diatur.</p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <button onclick="runGit('pull')" class="border border-orange-500 p-6 rounded-lg hover:bg-orange-900/50 transition flex flex-col items-center justify-center gap-2 group">
                            <span class="text-3xl group-hover:-translate-y-1 transition-transform">⬇️</span>
                            <span class="font-bold text-orange-400 text-lg">PULL UPDATES</span>
                            <span class="text-xs text-gray-500 text-center">Tarik kode terbaru dari GitHub ke server</span>
                        </button>
                        <button onclick="runGit('push')" class="border border-green-500 p-6 rounded-lg hover:bg-green-900/50 transition flex flex-col items-center justify-center gap-2 group">
                            <span class="text-3xl group-hover:-translate-y-1 transition-transform">⬆️</span>
                            <span class="font-bold text-green-400 text-lg">PUSH CHANGES</span>
                            <span class="text-xs text-gray-500 text-center">Upload revisi kode server ke GitHub (Auto Commit)</span>
                        </button>
                    </div>
                    
                    <div class="mt-8 border border-gray-800 rounded-lg bg-gray-900/50 flex flex-col">
                        <div class="bg-gray-800 px-4 py-2 border-b border-gray-700 text-xs text-gray-400 font-bold flex justify-between">
                            <span>GIT LOG OUTPUT</span>
                            <button onclick="runGit('status')" class="hover:text-white">Cek Status</button>
                        </div>
                        <div id="git-log" class="p-4 text-xs text-gray-300 h-48 overflow-y-auto whitespace-pre-wrap">Menunggu perintah aksi git...</div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#111827'); // gray-900 untuk menyatu dengan header

        let currentTab = 'termux';
        let secretToken = '';
        let ws = null;
        let pingInterval = null;
        const NGROK_URL = "dispersed-yard-manger.ngrok-free.dev"; 
        
        // Terminal Setup
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#f8fafc', cursor: '#22c55e', selection: 'rgba(255, 255, 255, 0.3)' },
            fontFamily: '"Courier New", Courier, monospace',
            fontSize: window.innerWidth < 600 ? 12 : 14,
            scrollback: 5000
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        window.addEventListener('resize', () => {
            if(document.getElementById('terminal-container').style.display !== 'none') {
                fitAddon.fit();
                if(ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                }
            }
        });

        // UI Functions
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }

        // WebSockets & Login
        function login() {
            const keyInput = document.getElementById('secret-key').value;
            if(!keyInput) return;
            secretToken = keyInput;
            document.getElementById('login-btn').innerText = "[ LOADING... ]";
            document.getElementById('login-error').classList.add('hidden');
            connectWebSocket();
        }

        function connectWebSocket() {
            if (ws) { ws.onclose = null; ws.close(); }
            if (pingInterval) clearInterval(pingInterval);

            if (currentTab === 'github') {
                document.getElementById('terminal-overlay').classList.add('hidden');
                return; 
            }

            // Ganti URL Ngrok sesuai dengan config
            const wsUrl = `wss://${NGROK_URL}/ws?tab=${currentTab}`;
            
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    ws.send(JSON.stringify({ type: 'auth', token: secretToken }));
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('terminal-overlay').classList.add('hidden');
                    
                    term.clear();
                    setTimeout(() => {
                        fitAddon.fit();
                        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                        
                        // Minta daftar sesi ke backend saat konek
                        ws.send(JSON.stringify({ type: 'request_sessions', tab: currentTab }));
                    }, 100);

                    pingInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
                    }, 25000);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if(data.type === 'status_update') updateVPSStatus(data.vps1, data.vps2, data.vps3);
                        else if(data.type === 'terminal_output') term.write(data.data);
                        else if(data.type === 'git_output') {
                            const gitLog = document.getElementById('git-log');
                            gitLog.innerText += "\n" + data.data;
                            gitLog.scrollTop = gitLog.scrollHeight;
                        }
                        else if(data.type === 'session_list') {
                            renderSessionList(data.data);
                        }
                    } catch (e) { term.write(event.data); }
                };

                ws.onclose = (event) => {
                    clearInterval(pingInterval); 
                    if (currentTab !== 'github') {
                        document.getElementById('terminal-overlay').classList.remove('hidden');
                        document.getElementById('overlay-text').innerText = "Connection lost. Retrying...";
                        
                        if(event.code === 4001 || document.getElementById('app-screen').classList.contains('hidden')) {
                            document.getElementById('login-btn').innerText = "[ CONNECT ]";
                            document.getElementById('login-error').innerText = "Access Denied / Ngrok Offline.";
                            document.getElementById('login-error').classList.remove('hidden');
                            document.getElementById('terminal-overlay').classList.add('hidden');
                        } else {
                            setTimeout(connectWebSocket, 3000);
                        }
                    }
                };
            } catch (e) {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-btn').innerText = "[ CONNECT ]";
            }
        }

        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: data }));
            }
        });

        // Tab Management
        function switchTab(tabId) {
            if(currentTab === tabId) return;
            currentTab = tabId;
            
            ['termux', 'vps1', 'vps2', 'vps3', 'github'].forEach(id => {
                const btn = document.getElementById(`tab-${id}`);
                btn.classList.remove('bg-gray-700', 'text-green-400', 'text-orange-400');
                if (id === 'github') btn.classList.add('text-gray-400');
                else btn.classList.add('text-gray-400');
            });
            
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-400');
            if(tabId === 'github') activeBtn.classList.add('bg-gray-700', 'text-orange-400');
            else activeBtn.classList.add('bg-gray-700', 'text-green-400');

            document.getElementById('sidebar-title').innerText = `SESSIONS (${tabId.toUpperCase()})`;

            if (tabId === 'github') {
                document.getElementById('terminal-container').style.display = 'none';
                document.getElementById('github-container').classList.remove('hidden');
                document.getElementById('terminal-overlay').classList.add('hidden');
                if(ws) ws.close();
            } else {
                document.getElementById('terminal-container').style.display = 'block';
                document.getElementById('github-container').classList.add('hidden');
                document.getElementById('terminal-overlay').classList.remove('hidden');
                document.getElementById('overlay-text').innerText = `Switching to ${tabId}...`;
                connectWebSocket();
            }
        }

        function updateVPSStatus(vps1, vps2, vps3) {
            document.getElementById('status-vps1').className = vps1 ? 'text-green-500 mr-1' : 'text-red-500 mr-1';
            document.getElementById('status-vps2').className = vps2 ? 'text-green-500 mr-1' : 'text-red-500 mr-1';
            document.getElementById('status-vps3').className = vps3 ? 'text-green-500 mr-1' : 'text-red-500 mr-1';
        }

        function renderSessionList(sessions) {
            const listContainer = document.getElementById('session-list');
            listContainer.innerHTML = ''; 

            if (!sessions || sessions.length === 0) {
                listContainer.innerHTML = '<p class="text-gray-500 text-xs px-2 py-4">Belum ada sesi tmux.</p>';
                return;
            }

            sessions.forEach(sess => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-3 py-2 rounded text-gray-400 hover:bg-gray-800 hover:text-green-400 transition';
                btn.innerHTML = `<span class="mr-2 text-xs">●</span> ${sess}`;
                
                // MENGAKTIFKAN FITUR PINDAH SESI YANG SEBELUMNYA HANYA ALERT
                btn.onclick = () => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'switch_session', name: sess, tab: currentTab }));
                    }
                    toggleSidebar();
                };
                listContainer.appendChild(btn);
            });
        }

        function triggerDownload() {
            const fileName = prompt(`Masukkan nama file yang ingin diunduh dari ${currentTab.toUpperCase()}:`, "config.py");
            if (fileName && ws && ws.readyState === WebSocket.OPEN) {
                term.write(`\r\n\x1b[36m[TMA]\x1b[0m Meminta unduhan file: ${fileName}...\r\n`);
                ws.send(JSON.stringify({ type: 'input', data: `.download ${fileName}\r` }));
            } else if (currentTab === 'github') {
                alert("Silakan pindah ke tab Termux/VPS untuk mengunduh file satuan.");
            }
        }

        function triggerUpload() {
            document.getElementById('file-uploader').click();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            alert(`Sistem siap mengunggah: ${file.name}\n(Catatan: Fitur transfer base64 ke terminal.py segera aktif di tahap backend selanjutnya)`);
            event.target.value = '';
        }

        function addSession() {
            // FIX NAMA SESI: Beri peringatan dan auto-format nama agar Tmux tidak menolak
            let sessName = prompt(`Masukkan NAMA SESI baru untuk ${currentTab.toUpperCase()}:\n(Hanya huruf, angka, & underscore. TANPA SPASI!)`, "bot_baru");
            if(sessName && ws && ws.readyState === WebSocket.OPEN) {
                // Hapus spasi dan karakter ilegal secara otomatis
                sessName = sessName.replace(/[^a-zA-Z0-9_]/g, "_");
                
                ws.send(JSON.stringify({ 
                    type: 'create_session', 
                    name: sessName, 
                    tab: currentTab 
                }));
                
                // HAPUS toggleSidebar() di sini agar laci tidak tertutup tiba-tiba
                // Tambahkan indikator loading di list
                document.getElementById('session-list').innerHTML = `<p class="text-green-500 text-xs px-2 py-4 animate-pulse">Membuat sesi '${sessName}'...</p>`;
                
            } else if (currentTab === 'github') {
                alert("Sesi Tmux tidak bisa dibuat di Tab GitHub.");
            }
        }

        function deleteSession() {
            const confirmation = confirm(`AWAS!\nApakah Anda yakin ingin MENGHAPUS sesi tmux saat ini?\n\nSemua script bot di dalamnya akan MATI (Killed).`);
            if(confirmation && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: `tmux kill-session\r` }));
                toggleSidebar();
            }
        }

        function runGit(action) {
            const gitLog = document.getElementById('git-log');
            gitLog.innerText += `\n[TMA] Menjalankan perintah git ${action}...`;
            
            if(!ws || ws.readyState !== WebSocket.OPEN) {
                const tempWsUrl = `wss://${NGROK_URL}/ws?tab=github`;
                const gitWs = new WebSocket(tempWsUrl);
                gitWs.onopen = () => {
                    gitWs.send(JSON.stringify({ type: 'auth', token: secretToken }));
                    gitWs.send(JSON.stringify({ type: 'git_action', action: action }));
                };
                gitWs.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        if(data.type === 'git_output') {
                            gitLog.innerText += "\n" + data.data;
                            gitLog.scrollTop = gitLog.scrollHeight;
                        }
                    } catch(err) {}
                };
            } else {
                ws.send(JSON.stringify({ type: 'git_action', action: action }));
            }
        }
    </script>
</body>
</html>
