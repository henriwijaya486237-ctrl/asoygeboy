<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Console Panel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <style>
        /* Penyesuaian khusus agar terminal pas di layar HP */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            overflow: hidden;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        #terminal-container {
            height: calc(100vh - 60px); /* Sisa layar setelah header tab */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #000;
        }
        .xterm .xterm-viewport {
            overflow-y: auto !important;
        }
        /* Custom scrollbar untuk terminal */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="antialiased flex flex-col h-screen">

    <div id="login-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900 px-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-slate-700">
            <div class="text-4xl mb-4">🔐</div>
            <h1 class="text-xl font-bold mb-2">Cloud Console Panel</h1>
            <p class="text-slate-400 text-sm mb-6">Masukkan Secret Key untuk mengakses server.</p>
            
            <input type="password" id="secret-key" placeholder="••••••" 
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-center text-xl tracking-widest focus:outline-none focus:border-blue-500 transition-colors mb-4">
            
            <button onclick="login()" id="login-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors flex justify-center items-center">
                <span>Hubungkan ke Server</span>
            </button>
            <p id="login-error" class="text-red-400 text-sm mt-4 hidden">Gagal terhubung. Periksa Key atau status Ngrok Termux.</p>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full w-full">
        
        <div class="bg-slate-800 border-b border-slate-700 flex overflow-x-auto hide-scrollbar whitespace-nowrap px-2 py-2 shrink-0">
            <button onclick="switchTab('termux')" id="tab-termux" class="tab-btn active-tab flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-600 text-white font-medium text-sm mr-2 transition-colors">
                <span class="w-2 h-2 rounded-full bg-green-400"></span> Termux Master
            </button>
            
            <button onclick="switchTab('vps1')" id="tab-vps1" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium text-sm mr-2 transition-colors">
                <span class="w-2 h-2 rounded-full bg-red-400" id="status-vps1"></span> VPS 1
            </button>

            <button onclick="switchTab('vps2')" id="tab-vps2" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium text-sm mr-2 transition-colors">
                <span class="w-2 h-2 rounded-full bg-red-400" id="status-vps2"></span> VPS 2
            </button>

            <button onclick="switchTab('vps3')" id="tab-vps3" class="tab-btn flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-700 text-slate-300 font-medium text-sm transition-colors">
                <span class="w-2 h-2 rounded-full bg-red-400" id="status-vps3"></span> VPS 3
            </button>
        </div>

        <div id="terminal-container" class="grow w-full relative">
            <div id="terminal-overlay" class="absolute inset-0 bg-black/80 z-10 hidden flex-col items-center justify-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white mb-2"></div>
                <p class="text-sm text-slate-300" id="overlay-text">Menyambungkan...</p>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Perluas app ke layar penuh

        // State Aplikasi
        let currentTab = 'termux';
        let secretToken = '';
        let ws = null;
        let pingInterval = null; // Tambahan untuk Anti-Idle
        const NGROK_URL = "dispersed-yard-manger.ngrok-free.dev"; // Dari config.py kamu
        
        // Setup XTerm.js
        const term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#000000',
                foreground: '#f8fafc',
                cursor: '#3b82f6',
            },
            fontFamily: 'Menlo, Monaco, "Courier New", monospace',
            fontSize: window.innerWidth < 600 ? 12 : 14, // Responsive font
            allowProposedApi: true
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        // Handle Resize layar
        window.addEventListener('resize', () => {
            fitAddon.fit();
            if(ws && ws.readyState === WebSocket.OPEN) {
                // Beritahu backend ukuran terminal berubah (opsional, untuk pty)
                ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
            }
        });

        // Fungsi Login & Koneksi WebSocket
        function login() {
            const keyInput = document.getElementById('secret-key').value;
            const errorMsg = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            
            if(!keyInput) return;
            
            secretToken = keyInput;
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>`;
            errorMsg.classList.add('hidden');

            connectWebSocket();
        }

        function connectWebSocket() {
            if (ws) {
                ws.close();
            }
            
            if (pingInterval) {
                clearInterval(pingInterval);
            }

            // Menyiapkan koneksi WebSocket Secure (wss://)
            const wsUrl = `wss://${NGROK_URL}/ws?token=${secretToken}&tab=${currentTab}`;
            
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    // Sukses Login
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('terminal-overlay').classList.add('hidden');
                    
                    term.clear();
                    term.writeln(`\x1b[1;32m[+] Terhubung ke Node: ${currentTab.toUpperCase()}\x1b[0m`);
                    
                    // Kirim info ukuran layar saat ini
                    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                    
                    fitAddon.fit();

                    // === FITUR HEARTBEAT (ANTI IDLE NGROK/CLOUDFLARE) ===
                    // Mengirim ping palsu setiap 25 detik agar tunnel tidak menganggap kita AFK
                    pingInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'ping' }));
                        }
                    }, 25000);
                };

                ws.onmessage = (event) => {
                    // Menulis output dari Termux/VPS ke browser
                    try {
                        const data = JSON.parse(event.data);
                        if(data.type === 'status_update') {
                            updateVPSStatus(data.vps1, data.vps2, data.vps3);
                        } else if(data.type === 'terminal_output') {
                            term.write(data.data);
                        }
                    } catch (e) {
                        term.write(event.data);
                    }
                };

                ws.onclose = (event) => {
                    clearInterval(pingInterval); // Hentikan detak jantung saat koneksi mati
                    document.getElementById('terminal-overlay').classList.remove('hidden');
                    document.getElementById('overlay-text').innerText = "Koneksi terputus. Mencoba ulang...";
                    
                    // Kembali ke layar login jika di-kick karena password salah
                    if(event.code === 4001 || document.getElementById('app-screen').classList.contains('hidden')) {
                        document.getElementById('login-btn').innerHTML = `<span>Hubungkan ke Server</span>`;
                        document.getElementById('login-error').innerText = "Akses ditolak atau Ngrok offline.";
                        document.getElementById('login-error').classList.remove('hidden');
                        document.getElementById('terminal-overlay').classList.add('hidden');
                    } else {
                        // Coba reconnect otomatis tiap 3 detik
                        setTimeout(connectWebSocket, 3000);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket Error:', error);
                };

            } catch (e) {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-btn').innerHTML = `<span>Hubungkan ke Server</span>`;
            }
        }

        // Tangkap ketikan keyboard dan kirim ke backend
        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: data }));
            }
        });

        // Logika Perpindahan Tab
        function switchTab(tabId) {
            if(currentTab === tabId) return; // Jangan lakukan apapun jika tab yang sama ditekan
            
            currentTab = tabId;
            
            // Reset gaya semua tab
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('bg-slate-700', 'text-slate-300');
            });
            
            // Aktifkan gaya tab yang dipilih
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('bg-slate-700', 'text-slate-300');
            activeBtn.classList.add('bg-blue-600', 'text-white');

            // Tampilkan loading overlay
            document.getElementById('terminal-overlay').classList.remove('hidden');
            document.getElementById('overlay-text').innerText = `Berpindah ke ${tabId.toUpperCase()}...`;

            // Sambungkan ulang WebSocket ke session yang baru
            connectWebSocket();
        }

        // Fungsi memperbarui titik indikator online/offline (Dipanggil oleh backend)
        function updateVPSStatus(vps1Online, vps2Online, vps3Online) {
            document.getElementById('status-vps1').className = vps1Online ? 'w-2 h-2 rounded-full bg-green-400' : 'w-2 h-2 rounded-full bg-red-400';
            document.getElementById('status-vps2').className = vps2Online ? 'w-2 h-2 rounded-full bg-green-400' : 'w-2 h-2 rounded-full bg-red-400';
            document.getElementById('status-vps3').className = vps3Online ? 'w-2 h-2 rounded-full bg-green-400' : 'w-2 h-2 rounded-full bg-red-400';
        }

    </script>
</body>
</html>
