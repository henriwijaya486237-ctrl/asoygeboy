<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termux Cloud Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <!-- Library untuk menghitung Diff Kode -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0; background-color: #000000; color: #fff;
            overflow: hidden; font-family: monospace;
        }
        /* Terminal Full Screen */
        #terminal-container {
            height: 100%; width: 100%; padding: 4px; box-sizing: border-box;
        }
        .xterm .xterm-viewport { overflow-y: auto !important; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        /* Drawer Sesi (Geser Kiri) */
        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar.open {
            transform: translateX(0);
        }
        
        /* Menyembunyikan Scrollbar di Tab Header tapi tetap bisa di-scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animasi Pop-up Chat */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased flex h-screen relative">

    <!-- LAYAR LOGIN -->
    <div id="login-screen" class="absolute inset-0 z-[60] flex flex-col items-center justify-center bg-black px-4">

            <input type="password" id="secret-key" placeholder="Enter Secret Key..." 
                class="w-full bg-transparent border-b border-green-800 text-green-400 px-2 py-2 text-center focus:outline-none focus:border-green-400 transition-colors mb-6 font-mono">
            <button onclick="login()" id="login-btn" class="w-full border border-green-700 hover:bg-green-900 text-green-400 py-2 transition-colors font-mono">
                [ CONNECT ]
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">Access Denied.</p>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Flex Column) -->

            <!-- Kiri: Hamburger + Tabs -->

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                
                <div class="flex overflow-x-auto no-scrollbar gap-2 items-center flex-1 pr-2">
                    <button onclick="switchTab('termux')" id="tab-termux" class="px-3 py-1.5 rounded bg-gray-700 text-green-400 whitespace-nowrap text-sm font-bold shadow-inner">Termux</button>
                    <button onclick="switchTab('vps1')" id="tab-vps1" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm border border-transparent hover:border-gray-700"><span id="status-vps1" class="text-red-500 mr-1">●</span>VPS 1</button>
                    <button onclick="switchTab('vps2')" id="tab-vps2" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm border border-transparent hover:border-gray-700"><span id="status-vps2" class="text-red-500 mr-1">●</span>VPS 2</button>

                    <button onclick="switchTab('github')" id="tab-github" class="px-3 py-1.5 rounded text-gray-400 whitespace-nowrap text-sm font-bold border border-transparent hover:border-gray-700">GitHub 🐙</button>

                <button onclick="triggerDownload()" title="Download File" class="bg-green-600/80 hover:bg-green-500 text-white p-2 rounded shadow text-sm">📥</button>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // Init Telegram WebApp 
        try {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.setHeaderColor('#111827'); 
        } catch (e) {}

        let currentTab = 'termux';
        let secretToken = '';
        let ws = null;
        let pingInterval = null;
        
        let ctrlActive = false;
        let altActive = false;

        const NGROK_URL = "dispersed-yard-manger.ngrok-free.dev"; 
        
        // --- TERMINAL SETUP ---
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#f8fafc', cursor: '#22c55e', selection: 'rgba(255, 255, 255, 0.3)' },
            fontFamily: '"Courier New", Courier, monospace',
            fontSize: window.innerWidth < 600 ? 12 : 14,
            scrollback: 5000
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        window.addEventListener('resize', () => {
            if(document.getElementById('terminal-container').style.display !== 'none') {
                fitAddon.fit();
                if(ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                }
            }
        });

        // --- SISTEM TOUCH SWIPE TO SCROLL ---
        let touchStartY = 0;
        document.getElementById('terminal-container').addEventListener('touchstart', e => {
            if(e.touches.length === 1) touchStartY = e.touches[0].clientY;
        }, {passive: true});

        document.getElementById('terminal-container').addEventListener('touchmove', e => {
            if (term.buffer.active.type === 'alternate' && e.touches.length === 1) {
                const touchY = e.touches[0].clientY;
                const deltaY = touchStartY - touchY;
                if (Math.abs(deltaY) > 15) { 
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'input', data: deltaY > 0 ? "\x1b[B" : "\x1b[A" }));
                    }
                    touchStartY = touchY; 
                }
            }
        }, {passive: true});

        // --- VIRTUAL KEYBOARD SYSTEM ---
        let vkRepeatInterval = null;
        let vkRepeatTimeout = null;

        const KEY_MAP = {
            'ESC': '\x1b', 'TAB': '\t', 'UP': '\x1b[A', 'DOWN': '\x1b[B',
            'RIGHT': '\x1b[C', 'LEFT': '\x1b[D', 'HOME': '\x1b[H', 'END': '\x1b[F',
            'PGUP': '\x1b[5~', 'PGDN': '\x1b[6~', '-': '-', '/': '/'
        };

        function toggleCtrl() {
            ctrlActive = !ctrlActive;
            const btn = document.getElementById('btn-ctrl');
            btn.classList.toggle('bg-blue-600', ctrlActive);
            btn.classList.toggle('text-white', ctrlActive);
            btn.classList.toggle('bg-gray-800', !ctrlActive);
            btn.classList.toggle('text-gray-300', !ctrlActive);
            if(ctrlActive) term.focus();
        }

        function toggleAlt() {
            altActive = !altActive;
            const btn = document.getElementById('btn-alt');
            btn.classList.toggle('bg-blue-600', altActive);
            btn.classList.toggle('text-white', altActive);
            btn.classList.toggle('bg-gray-800', !altActive);
            btn.classList.toggle('text-gray-300', !altActive);
            if(altActive) term.focus();
        }

        function startKeyRepeat(keyName, btnElement) {
            let finalData = KEY_MAP[keyName];
            if(!finalData) return;
            
            if (finalData.length === 1 && keyName !== 'ESC' && keyName !== 'TAB') {
                if (ctrlActive) {
                    const charCode = finalData.toLowerCase().charCodeAt(0);
                    if (charCode >= 97 && charCode <= 122) finalData = String.fromCharCode(charCode - 96); 
                    toggleCtrl();
                } else if (altActive) {
                    finalData = '\x1b' + finalData;
                    toggleAlt();
                }
            }

            const triggerSend = () => {
                if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'input', data: finalData }));
            };

            triggerSend();
            btnElement.classList.replace('bg-gray-800', 'bg-gray-600');
            term.focus();

            vkRepeatTimeout = setTimeout(() => {
                vkRepeatInterval = setInterval(triggerSend, 50);
            }, 400);
        }

        function stopKeyRepeat(btnElement) {
            clearTimeout(vkRepeatTimeout);
            clearInterval(vkRepeatInterval);
            if(btnElement) btnElement.classList.replace('bg-gray-600', 'bg-gray-800');
        }

        function setupVirtualKeyboard() {
            const keys = document.querySelectorAll('.vk-key');
            keys.forEach(btn => {
                const keyName = btn.getAttribute('data-key');
                if (!keyName) return;

                const handlePress = (e) => {
                    e.preventDefault(); 
                    if (e.type === 'touchstart' || e.type === 'mousedown') startKeyRepeat(keyName, btn);
                };

                const handleRelease = (e) => {
                    e.preventDefault();
                    stopKeyRepeat(btn);
                };

                btn.addEventListener('touchstart', handlePress, {passive: false});
                btn.addEventListener('touchend', handleRelease, {passive: false});
                btn.addEventListener('touchcancel', handleRelease, {passive: false});
                btn.addEventListener('mousedown', handlePress);
                btn.addEventListener('mouseup', handleRelease);
                btn.addEventListener('mouseleave', handleRelease);
            });

            const setupToggle = (id, toggleFn) => {
                const el = document.getElementById(id);
                if(el) {
                    const handler = (e) => { e.preventDefault(); toggleFn(); };
                    el.addEventListener('touchstart', handler, {passive: false});
                    el.addEventListener('mousedown', handler);
                }
            };
            
            setupToggle('btn-ctrl', toggleCtrl);
            setupToggle('btn-alt', toggleAlt);
        }

        setupVirtualKeyboard();

        // --- WEBSOCKET & LOGIN ---
        function login() {
            const keyInput = document.getElementById('secret-key').value;
            if(!keyInput) return;
            secretToken = keyInput;
            document.getElementById('login-btn').innerText = "[ LOADING... ]";
            document.getElementById('login-error').classList.add('hidden');
            connectWebSocket();
        }

        function connectWebSocket() {
            if (ws) { ws.onclose = null; ws.close(); }
            if (pingInterval) clearInterval(pingInterval);

            // Hide terminal components if opening GitHub tab
            if (currentTab === 'github') {
                document.getElementById('terminal-overlay').classList.add('hidden');
                document.getElementById('gemini-fab').classList.add('hidden');
                document.getElementById('virtual-keyboard').classList.add('hidden');
            } else {
                document.getElementById('terminal-overlay').classList.remove('hidden');
            }

            const wsUrl = `wss://${NGROK_URL}/ws?tab=${currentTab}`;
            
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    ws.send(JSON.stringify({ type: 'auth', token: secretToken }));
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    
                    if (currentTab === 'github') {
                        // Jika di tab GitHub, pancing load Repo
                        ghLoadRepos();
                    } else {
                        // Mode Terminal Biasa
                        document.getElementById('terminal-overlay').classList.add('hidden');
                        document.getElementById('gemini-fab').classList.remove('hidden');
                        document.getElementById('virtual-keyboard').classList.remove('hidden');
                        
                        term.clear();
                        setTimeout(() => {
                            fitAddon.fit();
                            ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                            ws.send(JSON.stringify({ type: 'request_sessions', tab: currentTab }));
                            ws.send(JSON.stringify({ type: 'request_models' })); // Tarik pilihan Model AI
                        }, 100);
                    }

                    pingInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
                    }, 25000);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if(data.type === 'status_update') updateVPSStatus(data.vps1, data.vps2, data.vps3);
                        else if(data.type === 'terminal_output') term.write(data.data);
                        else if(data.type === 'session_list') renderSessionList(data.data);
                        else if(data.type === 'gemini_response') appendGeminiMessage(data.text, 'bot', data.canvasData);
                        else if(data.type === 'model_list') {
                            const selectEl = document.getElementById('gemini-model-select');
                            if(selectEl && data.data && data.data.length > 0) {
                                selectEl.innerHTML = '';
                                data.data.forEach(m => {
                                    const opt = document.createElement('option');
                                    opt.value = m;
                                    opt.innerText = m.replace('gemini-', '').replace('-latest', '').toUpperCase();
                                    selectEl.appendChild(opt);
                                });
                            }
                        }
                        // GITHUB API RESPONSES
                        else if(data.type === 'github_repos') renderGhRepos(data.data);
                        else if(data.type === 'github_files') renderGhFiles(data.repo, data.path, data.data);
                        else if(data.type === 'github_file_content') openGhEditor(data.data);
                        else if(data.type === 'github_repo_created') { alert('Berhasil membuat Repository Baru!'); ghLoadRepos(); }
                        else if(data.type === 'github_file_saved') { 
                            alert('Perubahan File Berhasil di-Commit ke GitHub!'); 
                            closeGhEditor(); 
                            ghLoadFiles(ghCurrentRepo, ghCurrentPath); 
                        }
                        else if(data.type === 'github_file_deleted') { ghLoadFiles(ghCurrentRepo, ghCurrentPath); }
                        else if(data.type === 'github_error') { alert('Gagal: ' + data.message); }
                    } catch (e) { term.write(event.data); }
                };

                ws.onclose = (event) => {
                    clearInterval(pingInterval); 
                    if (currentTab !== 'github') {
                        document.getElementById('terminal-overlay').classList.remove('hidden');
                        document.getElementById('gemini-fab').classList.add('hidden');
                        document.getElementById('virtual-keyboard').classList.add('hidden');
                        document.getElementById('overlay-text').innerText = "Connection lost. Retrying...";
                        
                        if(event.code === 4001 || document.getElementById('app-screen').classList.contains('hidden')) {
                            document.getElementById('login-btn').innerText = "[ CONNECT ]";
                            document.getElementById('login-error').innerText = "Access Denied / Ngrok Offline.";
                            document.getElementById('login-error').classList.remove('hidden');
                            document.getElementById('terminal-overlay').classList.add('hidden');
                        } else {
                            setTimeout(connectWebSocket, 3000);
                        }
                    }
                };
            } catch (e) {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-btn').innerText = "[ CONNECT ]";
            }
        }

        // Hardware Keyboard Capture
        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN && currentTab !== 'github') {
                let finalData = data;
                if (ctrlActive && data.length === 1) {
                    const charCode = data.toLowerCase().charCodeAt(0);
                    if (charCode >= 97 && charCode <= 122) finalData = String.fromCharCode(charCode - 96); 
                    toggleCtrl();
                } else if (altActive && data.length === 1) {
                    finalData = '\x1b' + data; 
                    toggleAlt();
                }
                ws.send(JSON.stringify({ type: 'input', data: finalData }));
            }
        });

        // --- UPLOAD & DOWNLOAD UTILS ---

            if (currentTab === 'github') {

                return;
            }

        // ==========================================
        // FITUR GITHUB MANAGER (BARU)
        // ==========================================
        let ghCurrentRepo = '';
        let ghCurrentPath = '';
        let ghEditingSha = '';
        let ghEditingPath = '';

        // Safe Base64 Unicode Helpers
        function encodeToB64(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
        }
        function decodeFromB64(str) {
            return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }

        function ghLoadRepos() {
            ghCurrentRepo = ''; ghCurrentPath = '';
            document.getElementById('gh-breadcrumb').innerHTML = `<button onclick="ghLoadRepos()" class="hover:text-white flex items-center gap-1"><span>🐙</span> Repositories GitHub</button>`;
            document.getElementById('gh-actions').innerHTML = `<button onclick="ghCreateRepoPrompt()" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded-md text-xs sm:text-sm font-bold shadow">+ Repo Baru</button>`;
            document.getElementById('gh-content-area').innerHTML = '<div class="text-center text-gray-500 py-10 animate-pulse font-mono text-sm">🔄 Menghubungkan ke GitHub...</div>';
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'github_list_repos' }));
        }

        function renderGhRepos(repos) {
            if(!Array.isArray(repos) || repos.message) {
                document.getElementById('gh-content-area').innerHTML = `<div class="text-red-500 p-4">Error: ${repos.message || 'Gagal memuat repos'}</div>`;
                return;
            }
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-2">';
            repos.forEach(repo => {
                html += `<div onclick="ghLoadFiles('${repo.name}', '')" class="bg-gray-800/80 p-4 rounded-lg border border-gray-700 hover:border-orange-500 cursor-pointer flex justify-between items-center group transition-colors shadow-sm">
                    <div class="overflow-hidden">
                        <div class="text-orange-400 font-bold text-sm flex items-center gap-2 truncate">
                            📦 ${repo.name} <span class="text-[9px] bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded-full">${repo.private ? 'Private' : 'Public'}</span>
                        </div>
                        <div class="text-xs text-gray-400 mt-1 truncate">${repo.description || 'Tidak ada deskripsi.'}</div>
                    </div>
                    <span class="text-gray-600 group-hover:text-orange-400 transition-colors ml-2 text-xl">➔</span>
                </div>`;
            });
            html += '</div>';
            document.getElementById('gh-content-area').innerHTML = html;
        }

        function ghLoadFiles(repo, path) {
            ghCurrentRepo = repo; ghCurrentPath = path;
            
            let breadcrumbHtml = `<button onclick="ghLoadRepos()" class="hover:text-white text-gray-400 flex items-center gap-1"><span>🐙</span> Repos</button> <span class="text-gray-600">/</span> `;
            breadcrumbHtml += `<button onclick="ghLoadFiles('${repo}', '')" class="hover:text-white text-orange-400 font-bold px-1">${repo}</button> `;
            
            if (path) {
                const parts = path.split('/');
                let currentPathBuild = '';
                parts.forEach((part, index) => {
                    currentPathBuild += (index === 0 ? '' : '/') + part;
                    breadcrumbHtml += `<span class="text-gray-600">/</span> <button onclick="ghLoadFiles('${repo}', '${currentPathBuild}')" class="hover:text-white text-gray-300 px-1">${part}</button> `;
                });
            }
            document.getElementById('gh-breadcrumb').innerHTML = breadcrumbHtml;
            
            document.getElementById('gh-actions').innerHTML = `<button onclick="document.getElementById('file-uploader').click()" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded-md text-xs sm:text-sm shadow font-bold flex items-center gap-1">📤 Upload File</button>`;
            
            document.getElementById('gh-content-area').innerHTML = '<div class="text-center text-gray-500 py-10 animate-pulse font-mono text-sm">🔄 Membaca isi folder...</div>';
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'github_list_files', repo: repo, path: path }));
        }

        function renderGhFiles(repo, path, files) {
            if(!Array.isArray(files)) {
                let msg = files.message || 'Folder kosong atau gagal diakses.';
                if(msg === "This repository is empty.") files = [];
                else {
                    document.getElementById('gh-content-area').innerHTML = `<div class="text-gray-500 p-4 text-center italic text-sm">${msg}</div>`;
                    return;
                }
            }
            
            let html = '<div class="flex flex-col gap-1.5 p-2 font-mono">';
            
            if (path) {
                const parentPath = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';
                html += `<div onclick="ghLoadFiles('${repo}', '${parentPath}')" class="flex items-center gap-3 p-3 bg-gray-800/40 hover:bg-gray-800 border border-transparent hover:border-gray-700 rounded-lg cursor-pointer text-sm text-gray-300 transition-colors">
                    <span class="text-xl">🔙</span> <span class="font-bold">Kembali (..)</span>
                </div>`;
            }

            if (files.length === 0 && !path) {
                html += `<div class="text-center text-gray-500 py-10 italic">Repository ini masih kosong. Silakan upload file pertama Bos!</div>`;
            }

            files.forEach(file => {
                if(file.type === 'dir') {
                    html += `<div onclick="ghLoadFiles('${repo}', '${file.path}')" class="flex items-center gap-3 p-3 bg-gray-800/40 hover:bg-gray-800 border border-transparent hover:border-gray-700 rounded-lg cursor-pointer text-sm text-gray-300 transition-colors">
                        <span class="text-xl">📁</span> <span class="flex-1 font-bold text-blue-400">${file.name}</span>
                    </div>`;
                } else {
                    html += `<div class="flex flex-col sm:flex-row items-start sm:items-center justify-between p-3 bg-gray-800/40 hover:bg-gray-800 border border-transparent hover:border-gray-700 rounded-lg text-sm text-gray-300 transition-colors gap-2">
                        <div class="flex items-center gap-3 cursor-pointer flex-1 w-full" onclick="ghFetchFileContent('${repo}', '${file.path}')">
                            <span class="text-xl">📄</span> <span class="truncate hover:text-white">${file.name}</span>
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto justify-end mt-2 sm:mt-0">
                            <button onclick="ghFetchFileContent('${repo}', '${file.path}')" class="text-[11px] font-bold bg-gray-700 hover:bg-blue-600 text-white px-3 py-1.5 rounded-md transition-colors flex items-center gap-1">✏️ Edit</button>
                            <button onclick="ghDeleteFilePrompt('${file.path}', '${file.sha}')" class="text-[11px] font-bold bg-gray-700 hover:bg-red-600 text-white px-3 py-1.5 rounded-md transition-colors flex items-center gap-1">🗑️ Hapus</button>
                        </div>
                    </div>`;
                }
            });
            html += '</div>';
            document.getElementById('gh-content-area').innerHTML = html;
        }

        function ghCreateRepoPrompt() {
            const name = prompt("Masukkan nama Repository Baru (Tanpa Spasi):");
            if(name && ws) {
                document.getElementById('gh-content-area').innerHTML = '<div class="text-center text-green-500 py-10 animate-pulse font-mono text-sm">🛠️ Membangun Repository...</div>';

        function ghFetchFileContent(repo, path) {
            if(!ws) return;
            document.getElementById('gh-content-area').innerHTML = '<div class="text-center text-orange-400 py-10 animate-pulse font-mono text-sm">📦 Menyiapkan Kode dari GitHub...</div>';
            ws.send(JSON.stringify({ type: 'github_get_file', repo: repo, path: path }));
        }

        function openGhEditor(fileData) {
            ghLoadFiles(ghCurrentRepo, ghCurrentPath); 

            if(fileData.encoding === 'base64') {
                try {
                    const content = decodeFromB64(fileData.content.replace(/\n/g, ''));
                    document.getElementById('gh-editor-textarea').value = content;
                    ghEditingSha = fileData.sha;
                    ghEditingPath = fileData.path;
                    document.getElementById('gh-editor-title').innerText = fileData.path;
                    document.getElementById('gh-editor-modal').classList.remove('hidden');
                } catch(e) {
                    alert("Tidak dapat mendekode file ini (Kemungkinan file biner/gambar).");
                }
            } else {
                alert("Encoding file tidak didukung oleh Editor Panel.");
            }
        }

        function closeGhEditor() {
            document.getElementById('gh-editor-modal').classList.add('hidden');
            document.getElementById('gh-editor-textarea').value = '';
        }

        function saveGhEditor() {
            const content = document.getElementById('gh-editor-textarea').value;
            const b64 = encodeToB64(content);
            const msg = prompt("Pesan Commit (Wajib):", `Update file ${ghEditingPath}`);
            if (msg === null) return; // Batal commit
            
            document.getElementById('gh-editor-title').innerText = "⏳ Menyimpan Perubahan...";
            ws.send(JSON.stringify({
                type: 'github_save_file',
                repo: ghCurrentRepo,
                path: ghEditingPath,
                content: b64,
                sha: ghEditingSha,
                message: msg
            }));
        }

        function ghDeleteFilePrompt(path, sha) {
            if(confirm(`AWAS!\nYakin ingin MENGHAPUS file '${path}' secara permanen dari GitHub?`)) {
                ws.send(JSON.stringify({
                    type: 'github_delete_file',
                    repo: ghCurrentRepo,
                    path: path,
                    sha: sha
                }));
                document.getElementById('gh-content-area').innerHTML = '<div class="text-center text-red-500 py-10 animate-pulse font-mono text-sm">🗑️ Menghapus file...</div>';
            }
        }

        function ghHandleFileUpload(file) {
            if (!ghCurrentRepo) { alert("Pilih Repository dulu Bos sebelum upload!"); return; }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const b64Data = e.target.result.split(',')[1];
                const uploadPath = ghCurrentPath ? `${ghCurrentPath}/${file.name}` : file.name;
                
                const msg = prompt("Pesan Commit untuk file ini:", `Upload ${file.name}`);
                if (msg !== null) {
                    ws.send(JSON.stringify({
                        type: 'github_save_file',
                        repo: ghCurrentRepo,
                        path: uploadPath,
                        content: b64Data,
                        message: msg
                    }));
                    document.getElementById('gh-content-area').innerHTML = '<div class="text-center text-blue-400 py-10 animate-pulse font-mono text-sm">📤 Mengunggah file ke GitHub...</div>';
                }
            };
            reader.readAsDataURL(file);
        }

        // ==========================================
        // GEMINI AI & SMART DIFF CANVAS
        // ==========================================
        let currentCanvasPayloads = [];
        let currentCanvasIndex = 0;
        let lastAppliedPayloads = null;

        function toggleGeminiChat() {
            const modal = document.getElementById('gemini-chat-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) document.getElementById('gemini-input').focus();
        }

        function geminiNewChat() {
            document.getElementById('gemini-messages').innerHTML = `<div class="flex justify-start"><div class="bg-gray-800 border border-gray-700 p-3 rounded-lg rounded-tl-none max-w-[85%] text-gray-200">🔄 Sesi memori telah di-reset.</div></div>`;
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'gemini_action', action: 'new_chat' }));
        }

        function sendGeminiMessage() {
            const inputEl = document.getElementById('gemini-input');
            const text = inputEl.value.trim();
            if(!text) return;
            
            const selectedModel = document.getElementById('gemini-model-select').value;
            const selectedMode = document.getElementById('gemini-mode-select').value;
            
            appendGeminiMessage(text, 'user', null);
            inputEl.value = '';
            document.getElementById('gemini-messages').insertAdjacentHTML('beforeend', `<div id="loading-${Date.now()}" class="flex justify-start"><div class="bg-gray-800 border border-gray-700 p-3 rounded-lg rounded-tl-none text-gray-400 italic text-xs animate-pulse">Sedang menganalisa...</div></div>`);
            document.getElementById('gemini-messages').scrollTop = document.getElementById('gemini-messages').scrollHeight;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'gemini_chat', text: text, model: selectedModel, mode: selectedMode }));
            }
        }

        document.getElementById('gemini-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendGeminiMessage(); });

        function appendGeminiMessage(text, role, canvasData) {
            document.querySelectorAll('[id^="loading-"]').forEach(el => el.remove());
            const isUser = role === 'user';
            const msgContainer = document.getElementById('gemini-messages');
            
            msgContainer.insertAdjacentHTML('beforeend', `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'}">
                    <div class="${isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-gray-800 border border-gray-700 text-gray-200 rounded-tl-none'} p-3 rounded-lg max-w-[90%] whitespace-pre-wrap leading-relaxed shadow-sm">
                        ${escapeHtml(text)}
                    </div>
                </div>
            `);

            if(canvasData) {
                const payloads = Array.isArray(canvasData) ? canvasData : [canvasData];
                const validPayloads = payloads.filter(p => p && p.filename && p.newCode);
                
                if (validPayloads.length > 0) {
                    const canvasId = 'canvas-btn-' + Date.now();
                    window[canvasId] = validPayloads; 
                    
                    const isMulti = validPayloads.length > 1;
                    const multiText = isMulti ? ` (${validPayloads.length} File)` : '';
                    const hasModifications = validPayloads.some(p => p.oldCode);
                    const btnText = hasModifications ? "🖥️ Buka Smart Diff Canvas" : "📦 Tinjau File Baru";

                    msgContainer.insertAdjacentHTML('beforeend', `
                        <div class="flex justify-start mt-1 mb-2">
                            <button onclick="openGeminiCanvas(window['${canvasId}'])" class="bg-gray-900 border border-orange-500/50 hover:bg-orange-900/40 text-orange-400 font-bold px-4 py-2 rounded-lg text-xs flex items-center gap-2 shadow transition-colors">
                                ${btnText}${multiText}
                            </button>
                        </div>
                    `);
                }
            }
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function openGeminiCanvas(dataArray) {
            currentCanvasPayloads = dataArray;
            currentCanvasIndex = 0;
            renderCanvasContent();
            document.getElementById('gemini-canvas-modal').classList.remove('hidden');
        }

        function prevCanvasFile() {
            if (currentCanvasIndex > 0) {
                currentCanvasIndex--;
                renderCanvasContent();
            }
        }

        function nextCanvasFile() {
            if (currentCanvasIndex < currentCanvasPayloads.length - 1) {
                currentCanvasIndex++;
                renderCanvasContent();
            }
        }

        function renderCanvasContent() {
            const data = currentCanvasPayloads[currentCanvasIndex];
            document.getElementById('canvas-filename').innerText = data.filename;
            
            const navEl = document.getElementById('canvas-nav');
            if (currentCanvasPayloads.length > 1) {
                navEl.classList.remove('hidden');
                document.getElementById('canvas-counter').innerText = `${currentCanvasIndex + 1}/${currentCanvasPayloads.length}`;
            } else {
                navEl.classList.add('hidden');
            }
            
            const oldContainer = document.getElementById('canvas-old-code');
            const newContainer = document.getElementById('canvas-new-code');
            const btnApply = document.getElementById('btn-apply-code');
            
            const isBlockMode = data.mode === 'block';
            document.getElementById('canvas-title-old').innerText = isBlockMode ? '🔴 Blok Target (Search)' : '🔴 Kode Asli';
            document.getElementById('canvas-title-new').innerText = isBlockMode ? '🟢 Blok Revisi (Replace)' : '🟢 Kode AI (Revisi)';

            btnApply.innerHTML = currentCanvasPayloads.length > 1 ? '✨ Terapkan Semua' : '✨ Terapkan (Overwrite)';
            
            if(!data.oldCode) {
                oldContainer.innerHTML = '<div class="text-gray-500 italic px-2">// Pembuatan file baru.</div>';
                newContainer.innerHTML = `<div class="text-green-300 px-2 whitespace-pre">${escapeHtml(data.newCode)}</div>`;
            } else {
                renderSmartDiff(data.oldCode, data.newCode, oldContainer, newContainer);
            }
        }

        function renderSmartDiff(oldCode, newCode, oldContainer, newContainer) {
            const diff = Diff.diffLines(oldCode, newCode);
            let oldHtml = '';
            let newHtml = '';
            const CONTEXT_LINES = 3; 

            let diffLines = [];
            diff.forEach(part => {
                const val = part.value.endsWith('\n') ? part.value.slice(0, -1) : part.value;
                const lines = val.split('\n');
                lines.forEach(line => {
                    diffLines.push({ text: line, added: part.added, removed: part.removed });
                });
            });

            let changedIndices = [];
            diffLines.forEach((line, index) => {
                if (line.added || line.removed) changedIndices.push(index);
            });

            let visibleLines = new Set();
            changedIndices.forEach(idx => {
                for (let i = Math.max(0, idx - CONTEXT_LINES); i <= Math.min(diffLines.length - 1, idx + CONTEXT_LINES); i++) {
                    visibleLines.add(i);
                }
            });

            let lastVisible = -1;

            diffLines.forEach((line, index) => {
                if (visibleLines.has(index)) {
                    if (lastVisible !== -1 && index > lastVisible + 1) {
                        const hiddenCount = index - lastVisible - 1;
                        const sep = `<div class="text-gray-600 bg-gray-800/50 text-center text-[10px] sm:text-xs py-1 my-1 border-y border-gray-700 select-none">--- ${hiddenCount} baris disembunyikan ---</div>`;
                        oldHtml += sep; newHtml += sep;
                    }
                    
                    const safeText = escapeHtml(line.text) || ' '; 
                    
                    if (line.removed) {
                        oldHtml += `<div class="bg-red-900/60 text-red-200 px-2 block">${safeText}</div>`;
                    } else if (line.added) {
                        newHtml += `<div class="bg-green-900/60 text-green-200 px-2 block">${safeText}</div>`;
                    } else {
                        oldHtml += `<div class="text-gray-400 px-2 block">${safeText}</div>`;
                        newHtml += `<div class="text-gray-400 px-2 block">${safeText}</div>`;
                    }
                    lastVisible = index;
                }
            });

            if (changedIndices.length === 0) {
                oldHtml = '<div class="text-gray-500 italic px-2">// Tidak ada perubahan kode yang terdeteksi.</div>';
                newHtml = '<div class="text-gray-500 italic px-2">// Tidak ada perubahan kode yang terdeteksi.</div>';
            }

            oldContainer.innerHTML = oldHtml;
            newContainer.innerHTML = newHtml;
        }

        function closeGeminiCanvas() {
            document.getElementById('gemini-canvas-modal').classList.add('hidden');
            currentCanvasPayloads = [];
            currentCanvasIndex = 0;
        }

        function applyGeminiCode() {
            if(!currentCanvasPayloads.length || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            lastAppliedPayloads = JSON.parse(JSON.stringify(currentCanvasPayloads));
            
            ws.send(JSON.stringify({ 
                type: 'gemini_apply_code', 
                payloads: currentCanvasPayloads 
            }));
            
            const btn = document.getElementById('btn-apply-code');
            btn.innerHTML = '⏳ Menerapkan...'; btn.disabled = true;
            
            setTimeout(() => {
                closeGeminiCanvas();
                btn.disabled = false;
                
                const msgContainer = document.getElementById('gemini-messages');
                const rollbackId = 'rb-btn-' + Date.now();
                msgContainer.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-start">
                        <div class="bg-gray-800 border border-gray-700 p-3 rounded-lg rounded-tl-none max-w-[85%] text-gray-200 shadow-sm">
                            ✅ Berhasil! <span class="text-green-400 font-bold">${lastAppliedPayloads.length} File</span> telah di-update di server.<br><br>
                            <button id="${rollbackId}" onclick="rollbackLastAction(this)" class="w-full text-left bg-gray-700 hover:bg-gray-600 border border-gray-600 text-gray-300 font-bold px-3 py-2 rounded-lg text-xs shadow transition-colors flex justify-between items-center">
                                <span>⏪ Undo (Rollback Revisi)</span>
                                <span>↺</span>
                            </button>
                        </div>
                    </div>
                `);
                msgContainer.scrollTop = msgContainer.scrollHeight;
            }, 800);
        }

        function rollbackLastAction(btnElement) {
            if (!lastAppliedPayloads || !lastAppliedPayloads.length || !ws || ws.readyState !== WebSocket.OPEN) return;

            const rollbackPayloads = lastAppliedPayloads.map(p => {
                return {
                    filename: p.filename,
                    mode: p.mode || 'full',
                    oldCode: p.newCode, 
                    newCode: p.oldCode || '// File ini sebelumnya tidak ada (Dibuat oleh AI).\n// Perintah Rollback dijalankan untuk mengosongkan isi file ini demi keamanan.'
                };
            });

            if(btnElement) {
                btnElement.innerHTML = "⏳ Sedang memulihkan...";
                btnElement.disabled = true;
                btnElement.classList.replace('bg-gray-700', 'bg-gray-800');
                btnElement.classList.replace('hover:bg-gray-600', 'hover:bg-gray-800');
                btnElement.classList.remove('border-gray-600');
            }

            ws.send(JSON.stringify({
                type: 'gemini_apply_code',
                payloads: rollbackPayloads
            }));

            setTimeout(() => {
                const msgContainer = document.getElementById('gemini-messages');
                msgContainer.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-start">
                        <div class="bg-gray-800 border border-gray-700 p-3 rounded-lg rounded-tl-none max-w-[85%] text-gray-200 italic shadow-sm">
                            ⏪ Operasi Rollback berhasil! File telah dikembalikan ke kondisi persis seperti sebelum AI melakukan perubahan.
                        </div>
                    </div>
                `);
                msgContainer.scrollTop = msgContainer.scrollHeight;
                
                if(btnElement) btnElement.style.display = 'none'; 
                lastAppliedPayloads = null; 
            }, 1000);
        }
    </script>
</body>
</html>
