<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termux Cloud Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <style>
        body, html {
            height: 100%; margin: 0; background-color: #000000; color: #fff;
            overflow: hidden; font-family: monospace;
        }
        /* Terminal Full Screen ala Termux */
        #terminal-container {
            height: 100vh; width: 100vw; padding: 4px; box-sizing: border-box;
        }
        .xterm .xterm-viewport { overflow-y: auto !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        
        /* Drawer ala Termux (Geser Kiri) */
        #sidebar {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar.open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="antialiased flex h-screen relative">

    <!-- LAYAR LOGIN -->
    <div id="login-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black px-4">
        <div class="p-8 w-full max-w-sm text-center">
            <h1 class="text-green-500 font-bold text-xl mb-6">~ $ termux-login</h1>
            <input type="password" id="secret-key" placeholder="Enter Secret Key..." 
                class="w-full bg-transparent border-b border-green-800 text-green-400 px-2 py-2 text-center focus:outline-none focus:border-green-400 transition-colors mb-6 font-mono">
            <button onclick="login()" id="login-btn" class="w-full border border-green-700 hover:bg-green-900 text-green-400 py-2 transition-colors font-mono">
                [ CONNECT ]
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">Access Denied.</p>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="hidden h-full w-full relative">
        
        <!-- Tombol Hamburger (Kiri Atas) -->
        <button onclick="toggleSidebar()" class="absolute top-2 left-2 z-40 bg-gray-800/50 text-white p-2 rounded-md hover:bg-gray-700 focus:outline-none">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>

        <!-- Sidebar / Drawer Sessions -->
        <div id="sidebar" class="absolute inset-y-0 left-0 w-64 bg-gray-900 border-r border-gray-800 z-50 shadow-2xl flex flex-col">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center">
                <span class="text-green-400 font-bold">SESSIONS</span>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-1 font-mono text-sm">
                <button onclick="switchTab('termux')" id="tab-termux" class="w-full text-left px-3 py-2 rounded bg-gray-800 text-green-400">1. Termux Master</button>
                <button onclick="switchTab('vps1')" id="tab-vps1" class="w-full text-left px-3 py-2 rounded hover:bg-gray-800 text-gray-400"><span id="status-vps1" class="text-red-500">●</span> 2. VPS-Game-1</button>
                <button onclick="switchTab('vps2')" id="tab-vps2" class="w-full text-left px-3 py-2 rounded hover:bg-gray-800 text-gray-400"><span id="status-vps2" class="text-red-500">●</span> 3. VPS-Grup-2</button>
                <button onclick="switchTab('vps3')" id="tab-vps3" class="w-full text-left px-3 py-2 rounded hover:bg-gray-800 text-gray-400"><span id="status-vps3" class="text-red-500">●</span> 4. VPS-Berat-3</button>
            </div>
        </div>

        <!-- Lapisan Gelap saat sidebar buka -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="absolute inset-0 bg-black/50 z-40 hidden"></div>

        <!-- Terminal Area -->
        <div id="terminal-container" class="w-full h-full relative">
            <div id="terminal-overlay" class="absolute inset-0 bg-black/90 z-30 hidden flex-col items-center justify-center font-mono">
                <p class="text-green-500" id="overlay-text">Connecting...</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        let currentTab = 'termux';
        let secretToken = '';
        let ws = null;
        let pingInterval = null;
        const NGROK_URL = "dispersed-yard-manger.ngrok-free.dev"; 
        
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#f8fafc', cursor: '#22c55e' }, // Kursor Hijau
            fontFamily: '"Courier New", Courier, monospace',
            fontSize: window.innerWidth < 600 ? 12 : 14
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal-container'));
        fitAddon.fit();

        window.addEventListener('resize', () => {
            fitAddon.fit();
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('hidden');
        }

        function login() {
            const keyInput = document.getElementById('secret-key').value;
            if(!keyInput) return;
            secretToken = keyInput;
            document.getElementById('login-btn').innerText = "[ LOADING... ]";
            document.getElementById('login-error').classList.add('hidden');
            connectWebSocket();
        }

        function connectWebSocket() {
            if (ws) { ws.onclose = null; ws.close(); }
            if (pingInterval) clearInterval(pingInterval);

            // FIX BUG C: Token tidak lagi dikirim lewat URL
            const wsUrl = `wss://${NGROK_URL}/ws?tab=${currentTab}`;
            
            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    // Kirim Autentikasi sebagai payload pertama
                    ws.send(JSON.stringify({ type: 'auth', token: secretToken }));
                    
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('terminal-overlay').classList.add('hidden');
                    
                    term.clear();
                    ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                    fitAddon.fit();

                    pingInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
                    }, 25000);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if(data.type === 'status_update') updateVPSStatus(data.vps1, data.vps2, data.vps3);
                        else if(data.type === 'terminal_output') term.write(data.data);
                    } catch (e) { term.write(event.data); }
                };

                ws.onclose = (event) => {
                    clearInterval(pingInterval); 
                    document.getElementById('terminal-overlay').classList.remove('hidden');
                    document.getElementById('overlay-text').innerText = "Connection lost. Retrying...";
                    
                    if(event.code === 4001 || document.getElementById('app-screen').classList.contains('hidden')) {
                        document.getElementById('login-btn').innerText = "[ CONNECT ]";
                        document.getElementById('login-error').innerText = "Access Denied / Ngrok Offline.";
                        document.getElementById('login-error').classList.remove('hidden');
                        document.getElementById('terminal-overlay').classList.add('hidden');
                    } else {
                        setTimeout(connectWebSocket, 3000);
                    }
                };
            } catch (e) {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-btn').innerText = "[ CONNECT ]";
            }
        }

        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'input', data: data }));
            }
        });

        function switchTab(tabId) {
            if(currentTab === tabId) return;
            currentTab = tabId;
            
            // Update UI Sidebar
            ['termux', 'vps1', 'vps2', 'vps3'].forEach(id => {
                const btn = document.getElementById(`tab-${id}`);
                btn.classList.remove('bg-gray-800', 'text-green-400');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-gray-400');
            activeBtn.classList.add('bg-gray-800', 'text-green-400');

            toggleSidebar(); // Tutup sidebar otomatis

            document.getElementById('terminal-overlay').classList.remove('hidden');
            document.getElementById('overlay-text').innerText = `Switching to ${tabId}...`;
            connectWebSocket();
        }

        function updateVPSStatus(vps1, vps2, vps3) {
            document.getElementById('status-vps1').className = vps1 ? 'text-green-500' : 'text-red-500';
            document.getElementById('status-vps2').className = vps2 ? 'text-green-500' : 'text-red-500';
            document.getElementById('status-vps3').className = vps3 ? 'text-green-500' : 'text-red-500';
        }
    </script>
</body>
</html>
